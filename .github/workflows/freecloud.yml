name: Freecloud Auto Checkin

on:
  workflow_dispatch:      # 支持手动触发
  schedule:
    - cron: '0 1 * * *'    # 每天北京时间上午 9:00 运行 (UTC 1:00)

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install seleniumbase requests
          # 安装必要的系统库以运行 Chrome
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install SeleniumBase Browsers
        run: |
          # 这一步会下载匹配的 ChromeDriver
          sbase install chromedriver

      - name: Run Checkin Script
        env:
          # 这里的变量名必须与 Python 脚本中 os.environ.get 的一致
          FC_EMAIL: ${{ secrets.FC_EMAIL }}
          FC_PASSWORD: ${{ secrets.FC_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 使用 xvfb-run 启动虚拟显示器，这是过 Cloudflare 验证码的关键
          # 它模拟了一个真实的显示环境，让浏览器不被识别为纯 headless
          xvfb-run --auto-servernum python freecloud/freecloud.py
